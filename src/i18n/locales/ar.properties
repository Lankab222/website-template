faq.default.title=الأسئلة الشائعة
faq.default.subtitle=كل ما تحتاج معرفته عن المنتج والفواتير.
faq.home.1.q=هل هذا القالب مجاني للاستخدام؟
faq.home.1.a=نعم! القالب الأساسي مفتوح المصدر ومجاني للاستخدام في المشاريع الشخصية والتجارية. نقدم أيضاً نسخة Pro بميزات متقدمة ودعم مخصص.
faq.home.2.q=هل أحتاج إلى معرفة React؟
faq.home.2.a=بينما نستخدم React للجزر التفاعلية، يمكنك استخدام أي إطار عمل تفضله (Vue، Svelte، Solid) أو الاكتفاء بـ vanilla JS. Astro محايد لإطارات العمل حسب التصميم.
faq.home.3.q=كيف تعمل وظيفة البحث؟
faq.home.3.a=نحن نستخدم Fuse.js، وهي مكتبة بحث تقريبي خفيفة الوزن. توفر نتائج بحث فورية تتحمل الأخطاء الإملائية دون الحاجة إلى خادم خارجي أو مفتاح API.
faq.home.4.q=هل يمكنني نشر هذا على Vercel/Netlify؟
faq.home.4.a=بالتأكيد. القالب مهيأ مسبقاً بمحولات لـ Vercel و Netlify و Cloudflare Pages. فقط قم بالدفع إلى GitHub واربط مستودعك.
faq.home.5.q=ما الذي يجعل هذا القالب 'متميزاً'؟
faq.home.5.a=إلى جانب التصميم، نقوم بتضمين إعدادات من الدرجة الإنتاجية لـ SEO والتحليلات وخرائط المواقع وخلاصات RSS وصور open graph والوضع الليلي وإمكانية الوصول بشكل مباشر.
faq.pricing.1.q=هل يمكنني تبديل الخطط لاحقاً؟
faq.pricing.1.a=نعم، يمكنك الترقية أو التنزيل في أي وقت. سيتم تطبيق رسوم تناسبية.
faq.pricing.2.q=هل توجد فترة تجريبية مجانية؟
faq.pricing.2.a=نقدم فترة تجريبية مجانية لمدة 14 يوماً على خطة Pro حتى تتمكن من استكشاف جميع الميزات.
faq.pricing.3.q=ما هي طرق الدفع التي تقبلونها؟
faq.pricing.3.a=نقبل جميع بطاقات الائتمان الرئيسية، و PayPal، والتحويلات البنكية للمؤسسات.
faq.pricing.4.q=هل تقدمون استرداداً للأموال؟
faq.pricing.4.a=نعم، لدينا ضمان استرداد الأموال لمدة 30 يوماً إذا لم تكن راضياً.
