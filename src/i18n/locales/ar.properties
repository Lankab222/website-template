features.hero.title=مصمم للتميز
features.hero.desc=استكشف الميزات القوية والخيارات المعمارية الحديثة التي تجعل كوبر أكثر قوالب Astro تقدمًا في السوق.
features.search=بحث شامل
features.search.desc=لوحة أوامر مدمجة (Cmd+K) مدعومة بواسطة Fuse.js. بحث فائق السرعة، من جهة العميل، ومتسامح مع الأخطاء المطبعية عبر كل المحتوى.
features.blog=نظام مدونة متقدم
features.blog.desc=مدونة كاملة الميزات مع ترقيم الصفحات، خلاصات RSS، تقدير وقت القراءة، العلامات، وصور البطل المحسّنة.
features.seo=SEO ممتاز
features.seo.desc=خريطة موقع آلية، عناوين URL أساسية، وبيانات منظمة (JSON-LD) للمؤسسات والمنتجات والمقالات.
features.zerojs=صفر JS افتراضيًا
features.zerojs.desc=تقوم هندسة جزر Astro بترطيب المكونات التفاعلية فقط، مما يضمن درجات أداء Lighthouse 100/100.
features.images=تحسين الصور
features.images.desc=تحويل تلقائي لـ WebP/AVIF وتغيير الحجم المتجاوب لجميع الأصول باستخدام خط أنابيب الصور الأصلي لـ Astro.
features.security=أمان المؤسسات
features.security.desc=رؤوس أمان مكوّنة مسبقًا، CSP، وموافقة ملفات تعريف الارتباط المتوافقة مع الخصوصية مع استمرار التخزين المحلي.
features.i18n=جاهز لـ i18n
features.i18n.desc=هيكل مجلد قابل للتطوير ومنطق توجيه مصمم للتدويل والتوطين السلس.
features.a11y=إمكانية الوصول أولاً
features.a11y.desc=تم التدقيق للامتثال لـ WCAG مع تسميات ARIA المناسبة، HTML الدلالي، ودعم الوضع المظلم عالي التباين.
features.stack=مكدس تقني حديث
features.stack.desc=استفد من قوة Astro 6 و Tailwind CSS 4 و React 19 لتجربة تطوير متطورة حقاً.
features.controls=عناصر تحكم دقيقة
features.controls.desc=إدارة الميزات مثل البحث وترقيم الصفحات مباشرة من `site.config.ts`. قم بتبديل الوحدات تشغيلًا أو إيقافًا فورًا.
features.types=محتوى آمن النوع
features.types.desc=استفد من مجموعات محتوى Astro للتحقق الصارم من النوع على ملفات المدونة والمستندات وسجل التغييرات.
features.rss=RSS تلقائي
